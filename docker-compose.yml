version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: shms-postgres
    environment:
      POSTGRES_DB: shms_db
      POSTGRES_USER: shms_user
      POSTGRES_PASSWORD: shms_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shms_user -d shms_db"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - shms-network

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: shms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./deployment/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - shms-network

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: shms-backend
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://shms_user:shms_password@postgres:5432/shms_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-jwt-secret-key-change-in-production
      JWT_EXPIRES_IN: 7d
      BCRYPT_ROUNDS: 12
      API_VERSION: v1
      CORS_ORIGINS: http://localhost:3000,http://localhost:3002,http://localhost:3003
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shms-network
    command: npm run dev

  # Patient Portal Frontend
  patient-portal:
    build:
      context: ./frontend/patient-portal
      dockerfile: Dockerfile
      target: development
    container_name: shms-patient-portal
    environment:
      REACT_APP_API_URL: http://localhost:3001/api/v1
      REACT_APP_WS_URL: ws://localhost:3001
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/patient-portal:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - shms-network
    command: npm start

  # Clinician Portal Frontend
  clinician-portal:
    build:
      context: ./frontend/clinician-portal
      dockerfile: Dockerfile
      target: development
    container_name: shms-clinician-portal
    environment:
      REACT_APP_API_URL: http://localhost:3001/api/v1
      REACT_APP_WS_URL: ws://localhost:3001
      PORT: 3002
    ports:
      - "3002:3002"
    volumes:
      - ./frontend/clinician-portal:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - shms-network
    command: npm start

  # Operator Portal Frontend
  operator-portal:
    build:
      context: ./frontend/operator-portal
      dockerfile: Dockerfile
      target: development
    container_name: shms-operator-portal
    environment:
      REACT_APP_API_URL: http://localhost:3001/api/v1
      REACT_APP_WS_URL: ws://localhost:3001
      PORT: 3003
    ports:
      - "3003:3003"
    volumes:
      - ./frontend/operator-portal:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - shms-network
    command: npm start

  # AI/ML Engine Service
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
      target: development
    container_name: shms-ai-engine
    environment:
      NODE_ENV: development
      PORT: 3004
      DATABASE_URL: postgresql://shms_user:shms_password@postgres:5432/shms_db
      REDIS_URL: redis://redis:6379
      MODEL_PATH: /app/models
    ports:
      - "3004:3004"
    volumes:
      - ./ai-engine:/app
      - /app/node_modules
      - ./ai-engine/models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shms-network
    command: npm run dev

  # NGINX Reverse Proxy (Production-like setup)
  nginx:
    image: nginx:alpine
    container_name: shms-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deployment/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - patient-portal
      - clinician-portal
      - operator-portal
    networks:
      - shms-network

  # MinIO for File Storage (S3 Compatible)
  minio:
    image: minio/minio:latest
    container_name: shms-minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123456
    ports:
      - "9000:9000"
      - "9090:9090"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9090"
    networks:
      - shms-network

  # ElasticSearch for Search and Analytics
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: shms-elasticsearch
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      xpack.security.enabled: false
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - shms-network

  # Kibana for Log Visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: shms-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - shms-network

  # Prometheus for Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: shms-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./deployment/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - shms-network

  # Grafana for Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: shms-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3100:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deployment/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deployment/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - shms-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  elasticsearch_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  shms-network:
    driver: bridge
